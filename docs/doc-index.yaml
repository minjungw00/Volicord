version: 1
metadata:
  purpose: Route documentation retrieval by stable `doc_id`, owner family, and language.
  documentation_metadata_only: true
  runtime_config: false
retrieval_rule:
  load_one_language_per_doc_id: true
  default_agent_language: en
  allow_korean_when_user_context_is_korean: true
  paired_docs_must_not_be_loaded_together: true
  paired_docs_exception: translation_or_semantic_parity_review_only
docs:
  - doc_id: docs.index
    status: active
    family: index
    paths:
      en: docs/en/README.md
      ko: docs/ko/README.md
    default_for_agent: en
    primary_role: language_entry_route
    canonical_for:
      - language_specific_entry_routing
      - top_level_document_navigation
    owns:
      - language-specific entry routing
      - first-hop documentation navigation
    does_not_own:
      - technical contracts
      - active MVP scope
      - API details
      - storage details
      - security details
      - implementation readiness
    related_docs:
      - start
      - reference.index
      - maintain.authoring-guide

  - doc_id: start
    status: active
    family: start
    paths:
      en: docs/en/start.md
      ko: docs/ko/start.md
    default_for_agent: en
