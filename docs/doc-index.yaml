version: 1
metadata:
  purpose: "Machine-readable owner-routing metadata for the maintained Harness documentation set."
  default_language: "en"
  documentation_metadata: true
  runtime_config: false
  human_reference_index:
    en: "docs/en/reference/README.md"
    ko: "docs/ko/reference/README.md"
  human_term_guide:
    en: "docs/en/reference/glossary.md"
    ko: "docs/ko/reference/glossary.md"
  terminology_metadata: "docs/terminology-map.yaml"

language_retrieval:
  normal_lookup: "Use one language version for ordinary lookup, choosing the user's language when clear and `default_language` otherwise."
  paired_review_rule: "Translation review, bilingual parity review, and documentation quality review must read both `path_en` and `path_ko` for each affected `doc_id`."
  read_both_language_versions_for:
    - "translation review"
    - "bilingual parity review"
    - "documentation quality review"

entry_schema:
  required:
    - "doc_id"
    - "path_en"
    - "path_ko"
    - "role"
    - "owner_for"
    - "normative_level"
    - "audience"
  optional:
    - "not_owner_for"
    - "depends_on"
  roles:
    - "entry"
    - "use"
    - "reference"
    - "maintain"
    - "build"
  normative_levels:
    - "contract"
    - "guide"
    - "example"
    - "maintenance"

shared_documents:
  - doc_id: "agents.root"
    path: "AGENTS.md"
    role: "maintain"
    owner_for:
      - "repository-wide agent and maintainer working rules"
      - "scoped AGENTS.md instruction hierarchy"
      - "repository priority order for onboarding, developer learning, reference contracts, and maintenance metadata"
      - "global contract-first workflow guidance"
      - "global Harness/Core terminology distinction"
      - "global bilingual semantic-parity requirement"
      - "repository output and scratch artifact placement guidance"
      - "repository validation and reporting expectations"
    not_owner_for:
      - "documentation-specific authoring rules"
      - "Rust crate implementation placement rules"
      - "product contracts"
      - "reference contracts"
      - "API behavior"
      - "public API method list"
      - "storage effects"
      - "security guarantees"
      - "Core authority semantics"
      - "runtime behavior"
      - "implementation logs"
    normative_level: "maintenance"
    audience:
      - "agents"
      - "maintainers"

  - doc_id: "agents.docs"
    path: "docs/AGENTS.md"
    role: "maintain"
    owner_for:
