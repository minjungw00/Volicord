version: 1
metadata:
  purpose: "Machine-readable owner routing for the active Harness documentation set."
  default_language: "en"
  documentation_metadata: true
  runtime_config: false

language_retrieval:
  normal_lookup: "Use one language version for ordinary lookup, choosing the user's language when clear and `default_language` otherwise."
  paired_review_rule: "Translation review, bilingual parity review, and documentation quality review must read both `path_en` and `path_ko` for each affected `doc_id`."
  read_both_language_versions_for:
    - "translation review"
    - "bilingual parity review"
    - "documentation quality review"

entry_schema:
  required:
    - "doc_id"
    - "path_en"
    - "path_ko"
    - "role"
    - "owner_for"
    - "normative_level"
    - "audience"
  optional:
    - "not_owner_for"
    - "depends_on"
  roles:
    - "entry"
    - "use"
    - "reference"
    - "maintain"
    - "build"
  normative_levels:
    - "contract"
    - "guide"
    - "example"
    - "maintenance"

shared_documents:
  - doc_id: "agents.root"
    path: "AGENTS.md"
    role: "maintain"
    owner_for:
      - "repository agent working rules"
      - "documentation editing rules"
      - "first-read instructions for agents"
    not_owner_for:
      - "reference contracts"
      - "API behavior"
      - "storage effects"
    normative_level: "maintenance"
    audience:
      - "agents"
      - "maintainers"

  - doc_id: "readme.root"
    path: "README.md"
    role: "entry"
    owner_for:
      - "repository entry navigation"
      - "top-level documentation routes"
    not_owner_for:
      - "reference contracts"
      - "implementation contracts"
    normative_level: "guide"
    audience:
      - "all readers"

  - doc_id: "docs.root"
    path: "docs/README.md"
    role: "entry"
    owner_for:
      - "bilingual documentation language selection"
      - "first-hop documentation routes"
    not_owner_for:
      - "reference contracts"
      - "technical owner detail"
    normative_level: "guide"
    audience:
      - "all readers"

  - doc_id: "docs.doc-index"
    path: "docs/doc-index.yaml"
    role: "maintain"
    owner_for:
      - "owner-routing metadata"
      - "paired document path metadata"
      - "language retrieval rule"
    not_owner_for:
      - "product contracts"
      - "API contracts"
      - "storage contracts"
      - "security guarantees"
    normative_level: "maintenance"
    audience:
      - "agents"
      - "maintainers"

  - doc_id: "terminology.map"
    path: "docs/terminology-map.yaml"
    role: "maintain"
    owner_for:
      - "bilingual terminology controls"
      - "identifier preservation rules"
      - "Korean mixed-language expressions to avoid"
    not_owner_for:
      - "product contracts"
      - "API contracts"
      - "storage contracts"
      - "security guarantees"
    normative_level: "maintenance"
    audience:
      - "maintainers"
      - "translators"

