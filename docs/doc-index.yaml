version: 3
metadata:
  purpose: Machine-readable documentation metadata for maintained Volicord paths, reader purpose, maintenance
    responsibility, version applicability, and bilingual maintenance.
  default_language: en
  documentation_metadata: true
  runtime_config: false
  human_reference_index:
    en: docs/en/reference/README.md
    ko: docs/ko/reference/README.md
  human_term_guide:
    en: docs/en/reference/glossary.md
    ko: docs/ko/reference/glossary.md
  terminology_metadata: docs/terminology-map.yaml
  date_format: YYYY-MM-DD
  maintenance_verification_scope: last_verified_on records the date on which maintained paths, metadata,
    links, pairing, and owner routing were checked under the documentation maintenance policy.
language_retrieval:
  normal_lookup: Use one language version for ordinary lookup, choosing the user's language when clear
    and `default_language` otherwise.
  paired_review_rule: Translation review, bilingual parity review, and documentation quality review must
    read both `path_en` and `path_ko` for each affected `doc_id`.
  read_both_language_versions_for:
  - translation review
  - bilingual parity review
  - documentation quality review
owner_areas:
  repository_guidance:
    description: Repository-wide and scoped working-rule maintenance for agents and maintainers.
  onboarding:
    description: First-read, installation, and environment-orientation documentation maintenance.
  user_workflow:
    description: User-facing and agent-facing workflow guide maintenance.
  agent_connection:
    description: Agent host, MCP adapter, administrative setup, and Agent Connection documentation
      maintenance.
  developer_documentation:
    description: Source-learning, implementation workflow, architecture, and test documentation maintenance.
  core_api:
    description: Core authority model, public API, schema, projection, template, and value-set documentation
      maintenance.
  storage:
    description: Storage records, DDL, effects, artifact storage, and storage-versioning documentation
      maintenance.
  runtime_security:
    description: Runtime boundary and security guarantee documentation maintenance.
  quality_conformance:
    description: Conformance, validation meaning, and design-quality documentation maintenance.
  documentation_maintenance:
    description: Documentation metadata, terminology, translation, validation, and route-index maintenance.
applicability:
  volicord_workspace_0_1:
    description: Volicord workspace package version 0.1.0, as declared by the workspace `Cargo.toml`.
  rust_workspace_1_85:
    description: Repository Rust workspace requiring Rust 1.85 or newer, as declared by the workspace
      `Cargo.toml`.
  mcp_protocol_2025_11_25:
    description: MCP protocol version 2025-11-25 supported by the local `volicord-mcp` stdio process.
  storage_baseline_sqlite_v3_schema_v1:
    description: '`baseline_sqlite_v3` storage profile with registry and project-state schema version
      1.'
  doc_index_schema_v3:
    description: Documentation index metadata schema version 3 used by `docs/doc-index.yaml` and
      `docs-check`.
  terminology_map_v1:
    description: Terminology map metadata schema version 1 used by `docs/terminology-map.yaml`.
entry_schema:
  shared_required:
  - doc_id
  - path
  - kind
  - summary
  - normative_level
  - owner_area
  - created_on
  - last_updated_on
  - last_verified_on
  - applies_to
  paired_required:
  - doc_id
  - path_en
  - path_ko
  - kind
  - summary
  - normative_level
  - translation_policy
  - owner_area
  - created_on
  - last_updated_on
  - last_verified_on
  - applies_to
  optional:
  - primary_audience
  - journeys
  - canonical_for
  - depends_on
  maintenance_fields:
    owner_area: Scalar identifier selected from the top-level owner_areas catalog.
    created_on: Earliest verifiable introduction date for the maintained file or bilingual pair.
    last_updated_on: Latest verifiable content-update date for the maintained file or bilingual pair.
    last_verified_on: Maintenance verification date for paths, metadata, links, pairing, and owner routing.
    applies_to: Non-empty list of identifiers selected from the top-level applicability catalog.
  kinds:
  - landing
  - tutorial
  - how_to
  - explanation
  - reference
  - maintenance
  reader_journeys:
  - evaluate
  - install
  - operate
  - learn
  - implement
  - maintain
  normative_levels:
  - contract
  - guide
  - example
  - maintenance
  translation_policies:
  - semantic_parity
