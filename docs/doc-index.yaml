version: 1
metadata:
  purpose: Route documentation retrieval by stable `doc_id`, owner family, and language.
  documentation_metadata_only: true
  runtime_config: false
retrieval_rule:
  load_one_language_per_doc_id: true
  default_agent_language: en
  allow_korean_when_user_context_is_korean: true
  paired_docs_must_not_be_loaded_together: true
  paired_docs_exception: translation_or_semantic_parity_review_only
question_routes:
  purpose: Route high-signal agent questions to one primary owner, with a supporting owner only when the question spans routing or availability boundaries.
  routes:
    - question: "Which document should an agent read first?"
      canonical_owner_doc_id: agents.root
      default_path: AGENTS.md
      supporting_owner_doc_ids:
        - docs.doc-index
      route_note: "Read repository agent rules first, then use `docs/doc-index.yaml` for exact owner lookup."
    - question: "Where is retrieval or route metadata maintained?"
      canonical_owner_doc_id: docs.doc-index
      default_path: docs/doc-index.yaml
      route_note: "Machine-readable route metadata for `doc_id`, owner family, canonical ownership, related documents, and language paths."
    - question: "Where is the baseline scope defined?"
      canonical_owner_doc_id: reference.scope
      default_path: docs/en/reference/scope.md
      route_note: "Baseline scope and active/out-of-scope boundary."
    - question: "Where is the baseline scope excluded scope defined?"
      canonical_owner_doc_id: reference.scope
      default_path: docs/en/reference/scope.md
      route_note: "Scope owns included and excluded baseline scope items."
    - question: "API examples use what scenario?"
      canonical_owner_doc_id: reference.api.methods
      default_path: docs/en/reference/api/methods.md
      supporting_owner_doc_ids:
        - maintain.authoring-guide
        - maintain.checks
      route_note: "API Methods owns the current account data export confirmation scenario summary; Authoring Guide owns durable example rules; Checks owns example scenario review."
    - question: "Can API examples use documentation maintenance as the scenario?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "API examples must use durable product or user scenarios, not documentation maintenance, refactoring, route cleanup, section restructuring, or migration."
    - question: "Where are API example consistency questions routed?"
      canonical_owner_doc_id: maintain.checks
      default_path: docs/en/maintain/checks.md
      supporting_owner_doc_ids:
        - maintain.authoring-guide
        - reference.api.methods
      route_note: "Checks owns API example internal-consistency review; Authoring Guide owns durable example and field-name rules; API Methods owns the shared scenario summary; affected method and schema owners own concrete example fields."
    - question: "Where are field-name consistency questions routed?"
      canonical_owner_doc_id: maintain.checks
      default_path: docs/en/maintain/checks.md
      supporting_owner_doc_ids:
        - maintain.authoring-guide
      route_note: "Checks owns example field-name consistency review; Authoring Guide owns the durable field-name rule. Concrete field definitions route to the affected method, schema, or storage owner."
    - question: "Where is the active API method list?"
      canonical_owner_doc_id: reference.api.methods
      default_path: docs/en/reference/api/methods.md
      supporting_owner_doc_ids:
        - reference.api.schema-value-sets
      route_note: "API Methods owns the active public method list and owner routing; API Value Sets owns exact method-name values."
    - question: "`harness.intake` behavior"
      canonical_owner_doc_id: reference.api.method-intake
      default_path: docs/en/reference/api/method-intake.md
      route_note: "`harness.intake` method behavior."
    - question: "`harness.update_scope` behavior"
      canonical_owner_doc_id: reference.api.method-update-scope
      default_path: docs/en/reference/api/method-update-scope.md
      route_note: "`harness.update_scope` method behavior."
    - question: "`harness.status` behavior"
      canonical_owner_doc_id: reference.api.method-status
      default_path: docs/en/reference/api/method-status.md
      route_note: "`harness.status` method behavior."
    - question: "`harness.status` example state version rule"
      canonical_owner_doc_id: reference.api.method-status
      default_path: docs/en/reference/api/method-status.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "`harness.status` owns its read-only state-version behavior and representative example snapshot; Checks owns API example internal-consistency review."
    - question: "`harness.prepare_write` behavior"
      canonical_owner_doc_id: reference.api.method-prepare-write
      default_path: docs/en/reference/api/method-prepare-write.md
      route_note: "`harness.prepare_write` method behavior."
    - question: "`harness.prepare_write` sensitive approval"
      canonical_owner_doc_id: reference.api.method-prepare-write
      default_path: docs/en/reference/api/method-prepare-write.md
      route_note: "`harness.prepare_write` owns the method requirement for separate sensitive-action approval before allowed Write Authorization."
    - question: "`harness.prepare_write` payload fields"
      canonical_owner_doc_id: reference.api.method-prepare-write
      default_path: docs/en/reference/api/method-prepare-write.md
      supporting_owner_doc_ids:
        - reference.api.schema-core
        - reference.api.schema-state
        - reference.api.schema-judgment
        - reference.api.schema-value-sets
      route_note: "`harness.prepare_write` owns method-specific payload fields; shared `ToolEnvelope`, state, judgment, and value fields route to schema owners."
    - question: "`harness.stage_artifact` behavior"
      canonical_owner_doc_id: reference.api.method-stage-artifact
      default_path: docs/en/reference/api/method-stage-artifact.md
      route_note: "`harness.stage_artifact` method behavior."
    - question: "`harness.record_run` behavior"
      canonical_owner_doc_id: reference.api.method-record-run
      default_path: docs/en/reference/api/method-record-run.md
      route_note: "`harness.record_run` method behavior."
    - question: "`harness.record_run` evidence behavior"
      canonical_owner_doc_id: reference.api.method-record-run
      default_path: docs/en/reference/api/method-record-run.md
      supporting_owner_doc_ids:
        - reference.storage-effects
      route_note: "`harness.record_run` owns run/evidence method behavior; Storage Effects owns method-to-storage evidence effects and no-effect boundaries."
    - question: "`harness.record_run` payload fields"
      canonical_owner_doc_id: reference.api.method-record-run
      default_path: docs/en/reference/api/method-record-run.md
      supporting_owner_doc_ids:
        - reference.api.schema-core
        - reference.api.schema-state
        - reference.api.schema-artifacts
        - reference.api.schema-value-sets
      route_note: "`harness.record_run` owns method-specific payload fields; shared `ToolEnvelope`, state, artifact, and value fields route to schema owners."
    - question: "user judgment methods"
      canonical_owner_doc_id: reference.api.method-user-judgment
      default_path: docs/en/reference/api/method-user-judgment.md
      route_note: "User judgment method behavior for `harness.request_user_judgment` and `harness.record_user_judgment`."
    - question: "User judgment prompt ownership"
      canonical_owner_doc_id: reference.api.method-user-judgment
      default_path: docs/en/reference/api/method-user-judgment.md
      supporting_owner_doc_ids:
        - reference.core-model
      route_note: "The user-judgment method owner owns prompt creation and recording behavior; Core Model owns user-owned judgment meaning and non-substitution rules."
    - question: "`harness.close_task` behavior"
      canonical_owner_doc_id: reference.api.method-close-task
      default_path: docs/en/reference/api/method-close-task.md
      route_note: "`harness.close_task` method behavior."
    - question: "`harness.close_task` payload fields"
      canonical_owner_doc_id: reference.api.method-close-task
      default_path: docs/en/reference/api/method-close-task.md
      supporting_owner_doc_ids:
        - reference.api.schema-core
        - reference.api.schema-state
        - reference.api.schema-value-sets
      route_note: "`harness.close_task` owns method-specific payload fields; shared `ToolEnvelope`, close-readiness state, and value fields route to schema owners."
    - question: "Where are method response branch schemas defined?"
      canonical_owner_doc_id: reference.api.schema-core
      default_path: docs/en/reference/api/schema-core.md
      supporting_owner_doc_ids:
        - reference.api.schema-state
        - reference.api.schema-artifacts
        - reference.api.schema-judgment
        - reference.api.schema-value-sets
      route_note: "API Schema Core owns common response branches; nested state, artifact, judgment, and value fields route to their schema owners. Method owners own behavior, not shared schema bodies."
    - question: "Is `STATE_VERSION_CONFLICT` a blocker code?"
      canonical_owner_doc_id: reference.api.errors
      default_path: docs/en/reference/api/errors.md
      route_note: "Public error-code routing and blocker-code exclusions."
    - question: "Is `CloseReadinessBlocker` a storage row?"
      canonical_owner_doc_id: reference.storage-records
      default_path: docs/en/reference/storage-records.md
      route_note: "Storage row and DDL ownership; schema meaning remains with API State Schemas."
    - question: "`complete` enum vs full meaning"
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
      route_note: "Terminology Map and Glossary disambiguate prose versus identifier usage. Open API Value Sets only when the follow-up asks for the exact `intent=complete` value contract."
    - question: "When can `harness.close_task` with `dry_run=true` return something other than `ToolDryRunResponse`?"
      canonical_owner_doc_id: reference.api.method-close-task
      default_path: docs/en/reference/api/method-close-task.md
      route_note: "Method branch selection for `harness.close_task`."
    - question: 'How should "Full close-readiness evaluation order" be written in Korean?'
      canonical_owner_doc_id: reference.glossary
      default_path: docs/en/reference/glossary.md
      supporting_owner_doc_ids:
        - maintain.translation-guide
      route_note: "Use `전체 닫기 준비 상태 평가 순서` for the full close-readiness evaluation order; do not load API Value Sets unless the question is about the literal `complete` intent value."
    - question: "Artifact staging creates evidence?"
      canonical_owner_doc_id: reference.storage-artifacts
      default_path: docs/en/reference/storage-artifacts.md
      supporting_owner_doc_ids:
        - reference.storage-effects
      route_note: "Artifact Storage owns staging lifecycle and evidence-authority boundaries; Storage Effects owns method storage effects and no-evidence staging effects."
    - question: "Which document owns artifact promotion?"
      canonical_owner_doc_id: reference.storage-artifacts
      default_path: docs/en/reference/storage-artifacts.md
      route_note: "Artifact staging, validation, promotion, linking, and body-read lifecycle."
    - question: "Does the baseline scope provide OS sandboxing?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      route_note: "Security claims, guarantee wording, and explicit security non-claims."
    - question: "Which document owns `isolated` guarantee semantics?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      supporting_owner_doc_ids:
        - reference.scope
      route_note: "Security owns `isolated` guarantee semantics and non-claims; Scope confirms baseline-scope availability."
    - question: "Is `isolated` active in the baseline scope?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      supporting_owner_doc_ids:
        - reference.scope
      route_note: "Security states current isolation non-claims; Scope states the current guarantee boundary."
    - question: "Which document owns guarantee semantics?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      route_note: "Security owns guarantee semantics and guarantee wording for `cooperative`, `detective`, `preventive`, and `isolated`."
    - question: "Which document owns guarantee label values?"
      canonical_owner_doc_id: reference.api.schema-value-sets
      default_path: docs/en/reference/api/schema-value-sets.md
      route_note: "Guarantee label value names only; guarantee semantics and isolation claims route to Security."
    - question: "Where is `isolated` defined as a value?"
      canonical_owner_doc_id: reference.api.schema-value-sets
      default_path: docs/en/reference/api/schema-value-sets.md
      supporting_owner_doc_ids:
        - reference.security
      route_note: "API Value Sets owns the `isolated` value entry; Security owns its guarantee meaning and non-claim boundary."
    - question: "Where are access classes defined?"
      canonical_owner_doc_id: reference.api.schema-value-sets
      default_path: docs/en/reference/api/schema-value-sets.md
      route_note: "Active `access_class` values."
    - question: 'How should "close readiness" be written in Korean?'
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - maintain.translation-guide
      route_note: "Terminology Map controls the Korean term; Glossary explains product meaning; Translation Guide controls natural Korean style."
    - question: "Where is close readiness Korean terminology controlled?"
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - maintain.translation-guide
      route_note: "Use `닫기 준비 상태` in reference prose and the paired glossary/translation guidance for context."
    - question: "How should Korean close readiness terminology be written?"
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - maintain.translation-guide
      route_note: "Use `닫기 준비 상태` in reference prose and `닫기 가능 여부` only for user-facing close-readiness wording."
    - question: "Where are Korean prose and translation guidance controlled?"
      canonical_owner_doc_id: maintain.translation-guide
      default_path: docs/en/maintain/translation-guide.md
      supporting_owner_doc_ids:
        - terminology.map
        - reference.glossary
      route_note: "Translation Guide owns natural Korean prose and semantic-parity rules; Terminology Map owns machine-readable term controls; Glossary explains product term meaning and owner routing."
    - question: "Is a reserved, profile-gated, or out-of-scope capability an active requirement?"
      canonical_owner_doc_id: reference.scope
      default_path: docs/en/reference/scope.md
      supporting_owner_doc_ids:
        - reference.security
        - reference.api.schema-value-sets
      route_note: "Scope owns the active boundary; security and value-set owners define exact guarantee or value meaning."
    - question: "What does promotion-time owner update mean?"
      canonical_owner_doc_id: reference.glossary
      default_path: docs/en/reference/glossary.md
      supporting_owner_doc_ids:
        - reference.scope
      route_note: "Glossary defines the term; Scope owns whether a capability is active."
    - question: "Where does a storage effect question go?"
      canonical_owner_doc_id: reference.storage-effects
      default_path: docs/en/reference/storage-effects.md
      route_note: "Method-to-storage effect semantics route to Storage Effects before narrower storage owners."
    - question: "Which document owns storage effects?"
      canonical_owner_doc_id: reference.storage-effects
      default_path: docs/en/reference/storage-effects.md
      route_note: "Storage Effects owns method-to-storage effect semantics and no-effect boundaries."
    - question: "Where are storage record values defined?"
      canonical_owner_doc_id: reference.storage-records
      default_path: docs/en/reference/storage-records.md
      route_note: "Storage Records owns storage-owned record values, status fields, record-column meaning, and storage-owned JSON placement."
    - question: "Long table split rule"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "Authoring Guide owns long Markdown table split guidance; Checks owns the table source-maintainability review."
    - question: "When should a long Markdown table be split?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "Split a table when cells need lists, multiple conditions, multiple sentences, or source lines become hard to review."
    - question: "Dense paragraph split rule"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "Split dense reference prose when conditions, effects, exceptions, non-claims, or owner links are hidden in one paragraph."
docs:
  - doc_id: agents.root
    status: active
    family: root
    paths:
      shared: AGENTS.md
    default_for_agent: shared
    primary_role: repository_agent_rules
    canonical_for:
      - first_agent_reading_path
      - repository_agent_rules
      - documentation_editing_rules
      - owner_lookup_entry_rule
      - question_routes_before_broad_retrieval
    owns:
      - first-read agent instructions
      - repository agent rules
      - documentation editing rules
      - initial owner lookup rule before `docs/doc-index.yaml`
      - high-signal question route lookup before broad retrieval
    does_not_own:
      - technical contracts
      - baseline scope
      - API behavior
      - storage effects
      - security guarantees
      - terminology definitions
    related_docs:
      - docs.doc-index
      - maintain.authoring-guide
      - reference.index

  - doc_id: docs.doc-index
    status: active
    family: index
    paths:
      shared: docs/doc-index.yaml
    default_for_agent: shared
    primary_role: machine_readable_owner_router
    canonical_for:
      - exact_owner_routing_metadata
      - doc_id_route_table
      - owner_family_metadata
      - language_path_metadata
      - high_signal_question_routes
    owns:
      - machine-readable retrieval metadata
      - exact owner routing by `doc_id`
      - language path metadata
      - high-signal question routes
    does_not_own:
      - technical contracts
      - baseline scope
      - API behavior
      - storage effects
      - security guarantees
      - terminology definitions
    related_docs:
      - agents.root
      - readme.root
      - docs.root-index
      - reference.index
      - maintain.authoring-guide

  - doc_id: readme.root
    status: active
    family: index
    paths:
      shared: README.md
    default_for_agent: shared
    primary_role: repository_entry_route
