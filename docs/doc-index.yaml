version: 1
metadata:
  purpose: Route documentation retrieval by stable `doc_id`, owner family, and language.
  documentation_metadata_only: true
  runtime_config: false
retrieval_rule:
  load_one_language_per_doc_id: true
  default_agent_language: en
  allow_korean_when_user_context_is_korean: true
  paired_docs_must_not_be_loaded_together: true
  paired_docs_exception: translation_or_semantic_parity_review_only
question_routes:
  purpose: Route high-signal agent questions to one primary owner, with a supporting owner only when the question spans routing or availability boundaries.
  routes:
    - question: "Which document should an agent read first?"
      canonical_owner_doc_id: agents.root
      default_path: AGENTS.md
      supporting_owner_doc_ids:
        - docs.doc-index
      route_note: "Read repository phase and documentation-only rules first, then use `docs/doc-index.yaml` for exact owner lookup."
    - question: "Where is retrieval or route metadata maintained?"
      canonical_owner_doc_id: docs.doc-index
      default_path: docs/doc-index.yaml
      route_note: "Machine-readable route metadata for `doc_id`, owner family, canonical ownership, related documents, and language paths."
    - question: "Where is the current MVP scope defined?"
      canonical_owner_doc_id: reference.active-mvp-scope
      default_path: docs/en/reference/active-mvp-scope.md
      route_note: "Current MVP scope and active/later boundary."
    - question: "Where is the current MVP excluded scope defined?"
      canonical_owner_doc_id: reference.active-mvp-scope
      default_path: docs/en/reference/active-mvp-scope.md
      route_note: "Active MVP Scope owns included and excluded current-MVP scope items."
    - question: "What is the sample task used in API examples?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
        - reference.api.mvp-api
      route_note: "Authoring Guide owns durable example rules; Checks owns the example scenario review; MVP API carries the current account export confirmation example set."
    - question: "Can API examples use documentation maintenance as the scenario?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "API examples must use durable product or user scenarios, not documentation maintenance, refactoring, route cleanup, section restructuring, or migration."
    - question: "Is `STATE_VERSION_CONFLICT` a blocker code?"
      canonical_owner_doc_id: reference.api.errors
      default_path: docs/en/reference/api/errors.md
      route_note: "Public error-code routing and blocker-code exclusions."
    - question: "Is `CloseReadinessBlocker` a storage row?"
      canonical_owner_doc_id: reference.storage-records
      default_path: docs/en/reference/storage-records.md
      route_note: "Storage row and DDL ownership; schema meaning remains with API State Schemas."
    - question: 'Is `complete` an enum value or the word "full" in this context?'
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - reference.api.schema-value-sets
      route_note: "Terminology Map and Glossary disambiguate prose versus identifier usage; API Value Sets owns `intent=complete` as a value."
    - question: "When can `harness.close_task` with `dry_run=true` return something other than `ToolDryRunResponse`?"
      canonical_owner_doc_id: reference.api.mvp-api
      default_path: docs/en/reference/api/mvp-api.md
      route_note: "Method branch selection for `harness.close_task`."
    - question: 'How should "Full close-readiness evaluation order" be written in Korean?'
      canonical_owner_doc_id: reference.glossary
      default_path: docs/en/reference/glossary.md
      supporting_owner_doc_ids:
        - maintain.translation-guide
        - reference.api.schema-value-sets
      route_note: "Use `전체 닫기 준비 상태 평가 순서` for the full close-readiness evaluation order; use API Value Sets only when `complete` is the intent value."
    - question: "Does artifact staging create evidence?"
      canonical_owner_doc_id: reference.storage-artifacts
      default_path: docs/en/reference/storage-artifacts.md
      supporting_owner_doc_ids:
        - reference.storage-effects
      route_note: "Artifact Storage owns staging lifecycle and evidence-authority boundaries; Storage Effects owns method storage effects and no-evidence staging effects."
    - question: "Which document owns artifact promotion?"
      canonical_owner_doc_id: reference.storage-artifacts
      default_path: docs/en/reference/storage-artifacts.md
      route_note: "Artifact staging, validation, promotion, linking, and body-read lifecycle."
    - question: "Does the current MVP provide OS sandboxing?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      route_note: "Security claims, guarantee wording, and explicit security non-claims."
    - question: "Which document owns `isolated` guarantee semantics?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      supporting_owner_doc_ids:
        - reference.active-mvp-scope
      route_note: "Security owns `isolated` guarantee semantics and non-claims; Active MVP Scope confirms current-MVP availability."
    - question: "Is `isolated` active in the current MVP?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      supporting_owner_doc_ids:
        - reference.active-mvp-scope
      route_note: "Security states current isolation non-claims; Active MVP Scope states the current guarantee boundary."
    - question: "Which document owns guarantee semantics?"
      canonical_owner_doc_id: reference.security
      default_path: docs/en/reference/security.md
      route_note: "Security owns guarantee semantics and guarantee wording for `cooperative`, `detective`, `preventive`, and `isolated`."
    - question: "Which document owns guarantee label values?"
      canonical_owner_doc_id: reference.api.schema-value-sets
      default_path: docs/en/reference/api/schema-value-sets.md
      route_note: "Guarantee label value names only; guarantee semantics and isolation claims route to Security."
    - question: "Where is `isolated` defined as a value?"
      canonical_owner_doc_id: reference.api.schema-value-sets
      default_path: docs/en/reference/api/schema-value-sets.md
      supporting_owner_doc_ids:
        - reference.security
      route_note: "API Value Sets owns the `isolated` value entry; Security owns its guarantee meaning and non-claim boundary."
    - question: "Where are access classes defined?"
      canonical_owner_doc_id: reference.api.schema-value-sets
      default_path: docs/en/reference/api/schema-value-sets.md
      route_note: "Active `access_class` values."
    - question: 'How should "close readiness" be written in Korean?'
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - maintain.translation-guide
      route_note: "Terminology Map controls the Korean term; Glossary explains product meaning; Translation Guide controls natural Korean style."
    - question: "Where is close readiness Korean terminology controlled?"
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - maintain.translation-guide
      route_note: "Use `닫기 준비 상태` in reference prose and the paired glossary/translation guidance for context."
    - question: "How should Korean close readiness terminology be written?"
      canonical_owner_doc_id: terminology.map
      default_path: docs/terminology-map.yaml
      supporting_owner_doc_ids:
        - reference.glossary
        - maintain.translation-guide
      route_note: "Use `닫기 준비 상태` in reference prose and `닫기 가능 여부` only for user-facing close-readiness wording."
    - question: "Where should later candidates be documented?"
      canonical_owner_doc_id: later.index
      default_path: docs/en/later/index.md
      route_note: "Deferred candidate names and promotion boundaries."
    - question: "Where are artifact later candidates documented?"
      canonical_owner_doc_id: later.artifacts-and-evidence
      default_path: docs/en/later/artifacts-and-evidence.md
      supporting_owner_doc_ids:
        - later.index
      route_note: "Artifact and evidence later-candidate details live in the category page; the index routes category membership."
    - question: "Is a later candidate an active requirement?"
      canonical_owner_doc_id: later.index
      default_path: docs/en/later/index.md
      supporting_owner_doc_ids:
        - reference.active-mvp-scope
      route_note: "Later Index owns promotion boundary routing; Active MVP Scope confirms current active/later status."
    - question: "What does promotion-time owner update mean?"
      canonical_owner_doc_id: reference.glossary
      default_path: docs/en/reference/glossary.md
      supporting_owner_doc_ids:
        - later.index
      route_note: "Glossary defines the term; Later Index and category pages apply the promotion boundary."
    - question: "Where does a storage effect question go?"
      canonical_owner_doc_id: reference.storage-effects
      default_path: docs/en/reference/storage-effects.md
      route_note: "Method-to-storage effect semantics route to Storage Effects before narrower storage owners."
    - question: "Which document owns storage effects?"
      canonical_owner_doc_id: reference.storage-effects
      default_path: docs/en/reference/storage-effects.md
      route_note: "Storage Effects owns method-to-storage effect semantics and no-effect boundaries."
    - question: "Where are storage record values defined?"
      canonical_owner_doc_id: reference.storage-records
      default_path: docs/en/reference/storage-records.md
      route_note: "Storage Records owns storage-owned record values, status fields, record-column meaning, and storage-owned JSON placement."
    - question: "Where is the large-table authoring rule defined?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "Authoring Guide owns table source maintainability guidance; Checks owns the large-table review check."
    - question: "When should a long Markdown table be split?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "Split a table when cells need lists, multiple conditions, multiple sentences, or source lines become hard to review."
    - question: "When should a dense reference paragraph be split?"
      canonical_owner_doc_id: maintain.authoring-guide
      default_path: docs/en/maintain/authoring-guide.md
      supporting_owner_doc_ids:
        - maintain.checks
      route_note: "Split dense reference prose when conditions, effects, exceptions, non-claims, or owner links are hidden in one paragraph."
docs:
  - doc_id: agents.root
    status: active
    family: root
    paths:
      shared: AGENTS.md
    default_for_agent: shared
    primary_role: repository_agent_rules
    canonical_for:
      - first_agent_reading_path
      - repository_phase_rules
      - documentation_only_working_rules
      - owner_lookup_entry_rule
      - question_routes_before_broad_retrieval
    owns:
      - first-read agent instructions
      - repository phase boundaries
      - documentation-only working rules
      - initial owner lookup rule before `docs/doc-index.yaml`
      - high-signal question route lookup before broad retrieval
    does_not_own:
      - technical contracts
      - active MVP scope
      - API behavior
      - storage effects
      - security guarantees
      - terminology definitions
    related_docs:
      - docs.doc-index
      - maintain.authoring-guide
      - reference.index

  - doc_id: docs.doc-index
    status: active
    family: index
    paths:
      shared: docs/doc-index.yaml
    default_for_agent: shared
    primary_role: machine_readable_owner_router
    canonical_for:
      - exact_owner_routing_metadata
      - doc_id_route_table
      - owner_family_metadata
      - language_path_metadata
      - high_signal_question_routes
    owns:
      - machine-readable retrieval metadata
      - exact owner routing by `doc_id`
      - language path metadata
      - high-signal question routes
    does_not_own:
      - technical contracts
      - active MVP scope
      - API behavior
      - storage effects
      - security guarantees
      - terminology definitions
    related_docs:
      - agents.root
      - readme.root
      - docs.root-index
      - reference.index
