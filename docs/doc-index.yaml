version: 2
metadata:
  purpose: Machine-readable documentation metadata for maintained Harness paths, reader purpose, focused owner routing, and bilingual maintenance.
  default_language: en
  documentation_metadata: true
  runtime_config: false
  human_reference_index:
    en: docs/en/reference/README.md
    ko: docs/ko/reference/README.md
  human_term_guide:
    en: docs/en/reference/glossary.md
    ko: docs/ko/reference/glossary.md
  terminology_metadata: docs/terminology-map.yaml
language_retrieval:
  normal_lookup: Use one language version for ordinary lookup, choosing the user's language when clear and `default_language` otherwise.
  paired_review_rule: Translation review, bilingual parity review, and documentation quality review must read both `path_en` and `path_ko` for each affected `doc_id`.
  read_both_language_versions_for:
  - translation review
  - bilingual parity review
  - documentation quality review
entry_schema:
  shared_required:
  - doc_id
  - path
  - kind
  - summary
  - normative_level
  paired_required:
  - doc_id
  - path_en
  - path_ko
  - kind
  - summary
  - normative_level
  - translation_policy
  optional:
  - primary_audience
  - journeys
  - canonical_for
  - depends_on
  kinds:
  - landing
  - tutorial
  - how_to
  - explanation
  - reference
  - maintenance
  reader_journeys:
  - evaluate
  - install
  - operate
  - learn
  - implement
  - maintain
  normative_levels:
  - contract
  - guide
  - example
  - maintenance
  translation_policies:
  - semantic_parity
shared_documents:
- doc_id: agents.root
  path: AGENTS.md
  kind: maintenance
  summary: Repository-wide working rules for agents and maintainers.
  normative_level: maintenance
  primary_audience:
  - agents
  - maintainers
  journeys:
  - maintain
  canonical_for:
  - repository-wide agent and maintainer working rules
  - scoped AGENTS.md instruction hierarchy
  - repository priority order for onboarding, developer learning, reference contracts, and maintenance metadata
  - global contract-first workflow guidance
  - global Harness/Core terminology distinction
  - global bilingual semantic-parity requirement
  - repository output and scratch artifact placement guidance
  - repository validation and reporting expectations
- doc_id: agents.docs
  path: docs/AGENTS.md
  kind: maintenance
  summary: Documentation-specific working rules for maintained docs and metadata.
  normative_level: maintenance
  primary_audience:
  - agents
  - maintainers
  - translators
  journeys:
  - maintain
  canonical_for:
  - documentation-specific agent and maintainer working rules
  - reader-oriented documentation type rules
  - landing, tutorial, how-to, explanation, reference, maintenance, index, and route-only document distinctions
  - non-Reference explanation and Reference contract boundary guidance
  - documentation-specific bilingual semantic-parity guidance
  - maintained documentation artifact placement guidance
  - documentation validation expectations for scoped documentation edits
- doc_id: agents.crates
  path: crates/AGENTS.md
  kind: maintenance
  summary: Rust workspace working rules for implementation edits and validation.
  normative_level: maintenance
  primary_audience:
  - agents
  - implementers
  - maintainers
  journeys:
  - maintain
  canonical_for:
  - Rust implementation agent and maintainer working rules
  - crate implementation placement guidance
  - Core-to-adapter dependency-direction guidance
  - implementation test and fixture placement guidance
  - contract-first implementation routing guidance
  - Rust implementation validation expectations
- doc_id: readme.root
  path: README.md
  kind: landing
  summary: Top-level Harness repository landing page and first navigation route.
  normative_level: guide
  primary_audience:
  - all readers
  journeys:
  - evaluate
  - learn
- doc_id: docs.root
  path: docs/README.md
  kind: landing
  summary: Bilingual documentation directory landing page and language selector.
  normative_level: guide
  primary_audience:
  - all readers
  journeys:
  - evaluate
