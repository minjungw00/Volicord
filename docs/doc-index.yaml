version: 1
metadata:
  purpose: "Route documentation retrieval by stable doc_id and language."
  documentation_metadata_only: true
  runtime_config: false
retrieval_rule:
  load_one_language_per_doc_id: true
  default_agent_language: en
  allow_korean_when_user_context_is_korean: true
  paired_docs_must_not_be_loaded_together: true
  paired_docs_exception: translation_or_semantic_parity_review_only
docs:
  - doc_id: docs.index
    status: active
    family: index
    paths:
      en: docs/en/README.md
      ko: docs/ko/README.md
    default_for_agent: en
    owns: "Language-specific documentation entry points, current route overview, reader guidance, compact pointers to Reference, Later, Maintain, and route metadata, plus high-level routing for public API response branch owners and the dry-run branch-selection reminder that `StatusResult`/`CloseTaskResult` read-only results are distinct from `ToolDryRunResponse` previews."
    does_not_own: "Product thesis, exact contracts, implementation readiness, or detailed owner routing."

  - doc_id: start
    status: active
    family: start
    paths:
      en: docs/en/start.md
      ko: docs/ko/start.md
    default_for_agent: en
    owns: "First-read product thesis, user/agent/evidence/close concepts, and current guarantee boundary."
    does_not_own: "Exact API, schema, storage, security, conformance, or implementation-readiness contracts."

  - doc_id: use.user-guide
    status: active
    family: use
    paths:
      en: docs/en/use/user-guide.md
      ko: docs/ko/use/user-guide.md
    default_for_agent: en
    owns: "User-facing work loop guidance, judgment separation, evidence review, and close expectations."
    does_not_own: "Internal state transitions, API shapes, storage records, or connector behavior."

  - doc_id: use.agent-guide
    status: active
    family: use
    paths:
      en: docs/en/use/agent-guide.md
      ko: docs/ko/use/agent-guide.md
    default_for_agent: en
    owns: "Agent operating guidance, context discipline, user-judgment handling, and active/later caution."
    does_not_own: "Public API contracts, connector conformance detail, storage, or security guarantees."

  - doc_id: use.judgment-examples
    status: active
    family: use
    paths:
      en: docs/en/use/judgment-examples.md
      ko: docs/ko/use/judgment-examples.md
    default_for_agent: en
    owns: "Concrete examples for distinct user-owned judgment routes, the active focused judgment path, and later-presentation boundaries."
    does_not_own: "Canonical UserJudgment schema, gate rules, or lifecycle authority."

  - doc_id: build.mvp-plan
    status: active
    family: build
    paths:
      en: docs/en/build/mvp-plan.md
      ko: docs/ko/build/mvp-plan.md
    default_for_agent: en
    owns: "Implementation sequencing, current repository status, readiness decisions, the closed active MVP boundary, shaping readiness planning scope, first smoke target, and active/later planning exclusions."
    does_not_own: "Runtime records, generated artifacts, exact method-name sets, detailed schemas, enum value sets, DDL, or accepted implementation behavior."

  - doc_id: reference.index
    status: active
    family: reference
    paths:
      en: docs/en/reference/README.md
      ko: docs/ko/reference/README.md
    default_for_agent: en
    owns: "Reference owner routing for exact contract questions, including active MVP boundary, public API response branch routing for `ToolResultBase`, `ToolRejectedResponse`, `ToolDryRunResponse`, `MethodResult`, `response_kind`, `effect_kind`, and read-only `dry_run=true` examples such as `StatusResult` and `CloseTaskResult`, public `ErrorCode` and `STATE_VERSION_CONFLICT` owners, verified local surface access, request-level `VerifiedSurfaceContext.access_class`, `run_recording`, `artifact_registration`, `artifact_read`, project-wide `project_state.state_version`, staged artifacts, `StagedArtifactHandle` promotion, persistent `existing_artifact` / `ArtifactRef` linking, artifact body reads, evidence/close/projection/security/judgment/shaping owners, later-only routing, and maintain-route pointers."
    does_not_own: "Detailed schemas, DDL, transition tables, templates, errors, retrieval guidance, security guarantees, or implementation readiness."

  - doc_id: reference.core-model
    status: active
    family: reference
    paths:
      en: docs/en/reference/core-model.md
      ko: docs/ko/reference/core-model.md
    default_for_agent: en
    owns: "Core authority, task lifecycle, `ShapingReadiness` meaning, user judgment boundaries, final/residual-risk non-substitution, active gate meaning, `CompletionPolicy` and `EvidenceSummary` close effects, reserved gate promotion boundary, `close_task` blocker matrix, waivers, and residual risk."
    does_not_own: "Wire schema detail, exact enum/value sets, storage layout, public error precedence, connector recipes, or template bodies."

  - doc_id: reference.api.mvp-api
    status: active
    family: reference.api
    paths:
      en: docs/en/reference/api/mvp-api.md
      ko: docs/ko/reference/api/mvp-api.md
    default_for_agent: en
    owns: "Method-level request/response behavior for active public API methods, method-specific response unions and `MethodResult` branches, method state effects including committed blocked results when allowed, verified local surface request conditions, request-level `VerifiedSurfaceContext.access_class`, `harness.update_scope`, `harness.prepare_write` authorization effects, `harness.stage_artifact` with `artifact_registration`, `harness.record_run` with `run_recording`, staged artifact promotion behavior, artifact body reads with `artifact_read`, and `harness.close_task` behavior."
    does_not_own: "Exact active method-name value set, shared schema definitions, enum value sets, error precedence, storage DDL, or core lifecycle authority."

  - doc_id: reference.api.schema-core
    status: active
    family: reference.api
    paths:
      en: docs/en/reference/api/schema-core.md
      ko: docs/ko/reference/api/schema-core.md
    default_for_agent: en
    owns: "Exact active method-name set, shared API schemas, envelopes, common response branches including `ToolResultBase`, `ToolRejectedResponse`, and `ToolDryRunResponse`, shared `ToolError` and `EventRef` shapes, `response_kind`, `effect_kind`, `ToolEnvelope.expected_state_version`, `LocalSurfaceRegistration`, `VerifiedSurfaceContext.access_class`, active access-class values including `run_recording`, `artifact_registration`, and `artifact_read`, `StagedArtifactHandle`, `ArtifactInput` including `existing_artifact`, `CompletionPolicy`, `EvidenceSummary`, `SensitiveActionScope`, product-file `AuthorizedAttemptScope`, `ShapingReadiness`, close blocker schemas, active enum and schema value sets, rendered-label boundaries, and profile-gated value names."
    does_not_own: "Method-specific API behavior, persisted DDL, public error precedence, security guarantee claims, later schema bodies, or template bodies."

  - doc_id: reference.api.errors
    status: active
    family: reference.api
    paths:
      en: docs/en/reference/api/errors.md
      ko: docs/ko/reference/api/errors.md
    default_for_agent: en
    owns: "Public `ErrorCode` contract, status taxonomy, error precedence, `ToolError` public error use, local surface errors, `STATE_VERSION_CONFLICT`, `ToolRejectedResponse` pre-commit error boundaries, `ToolDryRunResponse` dry-run preview boundaries, read-only `dry_run=true` `MethodResult` behavior, committed blocked `MethodResult` boundaries, `close_task` blocker error mapping, and idempotency error behavior."
    does_not_own: "Core gates, method payload schemas, method-specific durable state effects such as `prepare_write` authorization creation, storage records, or connector fallback rules."

  - doc_id: reference.storage
    status: active
    family: reference
    paths:
      en: docs/en/reference/storage.md
      ko: docs/ko/reference/storage.md
    default_for_agent: en
    owns: "Storage layout, DDL, `project_state.state_version` as the single public project-wide state clock, persisted records such as `surfaces`, `write_authorizations`, staged artifact storage, staged artifact promotion persistence, persistent `existing_artifact` / `ArtifactRef` linking, artifact body-read storage eligibility, evidence summary rows, locks, artifact references, idempotency, and migrations."
    does_not_own: "API wire schema, security guarantees, projection templates, or generated runtime data."

  - doc_id: reference.runtime-boundaries
    status: active
    family: reference
    paths:
      en: docs/en/reference/runtime-boundaries.md
      ko: docs/ko/reference/runtime-boundaries.md
    default_for_agent: en
    owns: "Product Repository, Harness Server, Runtime Home, mutation authority, and non-isolation / OS-sandboxing non-claim boundaries."
    does_not_own: "Security controls, API schemas, storage DDL, or implementation deployment steps."

  - doc_id: reference.security
    status: active
    family: reference
    paths:
      en: docs/en/reference/security.md
      ko: docs/ko/reference/security.md
    default_for_agent: en
    owns: "Security assets, trust boundaries, explicit current MVP non-claims, cooperative/detective guarantee wording boundaries, capability-backed detective gating, sensitive-action permission versus product-file write scope, and profile-gated security display boundaries."
    does_not_own: "API schemas, storage DDL, connector context budgets, exact profile fields, or OS-level enforcement."

  - doc_id: reference.agent-integration
    status: active
    family: reference
    paths:
      en: docs/en/reference/agent-integration.md
      ko: docs/ko/reference/agent-integration.md
    default_for_agent: en
    owns: "Agent connector behavior, `capability_profile`, verified surface context in agent packets, detective display gating from capability checks, one-language-per-`doc_id` retrieval guidance, context push/pull guidance, fallback semantics, surface recipes, and agent guarantee wording limits."
    does_not_own: "Core state authority, public API schemas, storage layout, security guarantee meanings, or security proof."

  - doc_id: reference.projection-and-templates
    status: active
    family: reference
    paths:
      en: docs/en/reference/projection-and-templates.md
      ko: docs/ko/reference/projection-and-templates.md
    default_for_agent: en
    owns: "Read-only derived display boundaries, projection/status-card non-authority, rendered display labels, template bodies, freshness, and later-only boundary for projection reconcile, persistent projection jobs, and managed block drift repair."
    does_not_own: "Source-of-truth state, storage authority, API method contracts, evidence authority, or active projection mutation paths."

  - doc_id: reference.conformance
    status: active
    family: reference
    paths:
      en: docs/en/reference/conformance.md
      ko: docs/ko/reference/conformance.md
    default_for_agent: en
    owns: "Conformance meaning, future fixture shape, assertion authority, active smoke-target examples, capability honesty assertions, non-executable suite boundaries, and representative examples."
    does_not_own: "Executable runners, runtime conformance reports, active implementation output, or API schemas."

  - doc_id: reference.design-quality
    status: active
    family: reference
    paths:
      en: docs/en/reference/design-quality.md
      ko: docs/ko/reference/design-quality.md
    default_for_agent: en
    owns: "Design-quality activation, finding severity, close-blocking behavior, waiver boundary, and validator ID boundary."
    does_not_own: "Broad product design choices, core gate definitions, storage DDL, or conformance runner output."

  - doc_id: reference.glossary
    status: active
    family: reference
    paths:
      en: docs/en/reference/glossary.md
      ko: docs/ko/reference/glossary.md
    default_for_agent: en
    owns: "Official terminology for public, core, API/schema, storage, security, agent, and later terms, including active MVP methods, `ToolResultBase`, `ToolRejectedResponse`, `ToolDryRunResponse`, `MethodResult`, `StatusResult`, `CloseTaskResult`, `ToolError`, `EventRef`, `response_kind`, `dry_run`, `effect_kind`, and `effect_kind=read_only`."
    does_not_own: "Contract details, schemas, DDL, transition rules, or implementation sequencing."

  - doc_id: later.index
    status: later
    family: later
    paths:
      en: docs/en/later/index.md
      ko: docs/ko/later/index.md
    default_for_agent: en
    owns: "Later candidate names and promotion boundaries only, including `captured_artifact`, native artifact capture, projection reconcile, persistent projection jobs, managed block drift repair, full Evidence Manifest, `qa_gate`, `verification_gate`, observation, full-format judgment presentation, future operations, and future fixture families."
    does_not_own: "Active MVP requirements, active API/schema contracts, full template bodies, full fixture YAML, later schema bodies, or implementation readiness."

  - doc_id: maintain.authoring-guide
    status: maintain
    family: maintain
    paths:
      en: docs/en/maintain/authoring-guide.md
      ko: docs/ko/maintain/authoring-guide.md
    default_for_agent: en
    owns: "Documentation editing rules, owner-boundary discipline, active/later hygiene, and stale-content deletion."
    does_not_own: "Harness runtime contracts, generated records, API schemas, or implementation approval."

  - doc_id: maintain.translation-guide
    status: maintain
    family: maintain
    paths:
      en: docs/en/maintain/translation-guide.md
      ko: docs/ko/maintain/translation-guide.md
    default_for_agent: en
    owns: "Bilingual semantic parity rules, Korean terminology guidance, and exact-identifier preservation."
    does_not_own: "Runtime configuration, source-of-truth state, acceptance records, or product contracts."

  - doc_id: maintain.checks
    status: maintain
    family: maintain
    paths:
      en: docs/en/maintain/checks.md
      ko: docs/ko/maintain/checks.md
    default_for_agent: en
    owns: "Documentation checks for links, bilingual maps, owner boundaries, retrieval, stale content, public error-code consistency, `access_class` consistency, and artifact lifecycle consistency."
    does_not_own: "Runtime proof, server conformance, generated QA, acceptance, or implementation completeness."
