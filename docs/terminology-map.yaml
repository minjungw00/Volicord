      - "current owner document"
    owner_documents:
      en:
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/README.md"
      ko:
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/README.md"
    notes:
      - "Use only when the canonical owner exists now and can be linked as the current source of normative meaning."
