    - phrase: "artifact bytes"
      use: "아티팩트 본문 바이트"
    - phrase: "evidence 기록"
      use: "증거 기록, 또는 식별자를 뜻할 때는 `EvidenceSummary` 같은 정확한 이름"
    - phrase: "evidence summary"
      use: "증거 요약, 또는 스키마를 뜻할 때는 `EvidenceSummary`"
    - phrase: "evidence collection workflow"
      use: "증거 수집 흐름"
    - phrase: "staged handle"
      use: "스테이징된 아티팩트 핸들, 또는 식별자를 뜻할 때는 `StagedArtifactHandle`"
    - phrase: "checksum, size 검증"
      use: "체크섬과 크기 검증"
    - phrase: "ToolEnvelope 봉투"
      use: "`ToolEnvelope` 요청 래퍼"
