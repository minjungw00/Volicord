        - "docs/ko/reference/runtime-boundaries.md"
        - "docs/ko/build/mvp-plan.md"
    notes:
      - "Documentation-only work does not implement runtime behavior or create generated runtime records."
  active_mvp:
    category: "product_concept"
    en: "active MVP"
    ko_reference: "현재 MVP"
    ko_user: "현재 MVP"
    aliases_en:
      - "current MVP"
    owner_documents:
      en:
        - "docs/en/reference/active-mvp-scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
