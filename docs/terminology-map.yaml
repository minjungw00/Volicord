      ko:
        - "docs/ko/later/index.md"
        - "docs/ko/reference/active-mvp-scope.md"
    notes:
      - "A later candidate is deferred material until an owner promotes it."
  reserved_value:
    category: "value_status"
    en: "reserved value"
    ko_reference: "예약된 값"
    ko_user: "예약된 값"
    owner_documents:
      en:
        - "docs/en/reference/active-mvp-scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/active-mvp-scope.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "A reserved value may be listed as vocabulary or future surface area without being active current-MVP behavior."
      - "Mark reserved values at the point of use; do not imply default, required, supported, enforced, accepted, verified, or close-ready behavior unless the active owner says so."
  profile_gated_value:
    category: "value_status"
    en: "profile-gated value"
    ko_reference: "profile-gated 값"
    ko_user: "profile-gated 값"
    owner_documents:
      en:
        - "docs/en/reference/active-mvp-scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
