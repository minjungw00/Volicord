version: 1
title: "Terminology Map"
documentation_metadata_only: true
runtime_config: false
canonical_for:
  - "Recommended English and Korean terminology for Harness documentation."
  - "Identifier preservation rules for bilingual documentation."
  - "Mixed-language Korean expressions to avoid during human or LLM editing."
  - "Korean close-readiness terminology routing for `닫기 준비 상태` and `닫기 가능 여부`."
  - "Search-friendly routing for promotion-time owner update terminology."
  - "Terminology distinction between `complete` as an enum/identifier and ordinary prose meaning full or entire."
  - "Terminology boundaries for reserved/profile-gated value presence versus supported behavior."
  - "Terminology boundaries between stable supported documentation contracts and runtime-active or currently applied context."
  - "Terminology boundaries between documentation owner routing and product behavior or storage persistence conditions."
  - "Terminology routing for API error routing, blocker routing, error/blocker boundaries, public error as blocker wording, and `ToolError.details`."
  - "Artifact and evidence terminology conventions for bilingual documentation."
  - "Terminology routing for evidence collection workflow wording, close-task behavior, and design-quality owner boundaries."
does_not_own:
  - "Product, API, storage, security, projection, or runtime contracts."
  - "Rendered UI copy when an exact template body owner defines the wording."
  - "Runtime localization configuration."
related_owners:
  glossary:
    en: "docs/en/reference/glossary.md"
    ko: "docs/ko/reference/glossary.md"
  translation_guide:
    en: "docs/en/maintain/translation-guide.md"
    ko: "docs/ko/maintain/translation-guide.md"
identifier_preservation:
  rule: "Preserve exact identifiers unchanged in English and Korean. Use backticks in prose when the value is code-like, schema-like, or a product label that must be searched exactly."
  identifiers:
    - "Task"
    - "task_id"
    - "active_task_id"
    - "scope"
    - "scope_decision"
    - "UserJudgment"
    - "user_judgment"
    - "judgment_kind"
    - "CloseReadinessBlocker"
    - "CloseReadinessBlocker.category"
    - "CloseReadinessBlocker.code"
    - "ArtifactRef"
    - "ArtifactInput"
    - "StagedArtifactHandle"
    - "artifact_id"
    - "staged_artifact_handle"
    - "EvidenceSummary"
    - "EvidenceCoverageItem"
    - "evidence_summary"
    - "evidence_updates"
    - "evidence_summaries"
    - "ProjectionKind"
    - "ToolEnvelope"
    - "ToolRejectedResponse"
    - "ToolDryRunResponse"
    - "DryRunSummary"
    - "PlannedBlocker"
    - "ToolError"
    - "ToolError.details"
    - "ErrorCode"
    - "SensitiveActionScope"
    - "AuthorizedAttemptScope"
    - "surface_id"
    - "surface_instance_id"
    - "VerifiedSurfaceContext"
    - "VerifiedSurfaceContext.access_class"
    - "access_class"
    - "state_version"
    - "Task.lifecycle_phase"
    - "artifact_staging.status"
  product_labels:
    - "Product Repository"
    - "Harness Runtime Home"
    - "Projection"
    - "Write Authorization"
avoid:
  ko:
    - phrase: "close 가능성 평가"
      use: "닫기 준비 상태 평가"
    - phrase: "닫기 가능성 평가"
      use: "닫기 준비 상태 평가"
    - phrase: "artifact 저장"
      use: "아티팩트 저장소, 또는 동작을 뜻할 때는 아티팩트를 저장"
    - phrase: "artifact bytes"
      use: "아티팩트 본문 바이트"
    - phrase: "evidence 기록"
      use: "증거 기록, 또는 식별자를 뜻할 때는 `EvidenceSummary` 같은 정확한 이름"
    - phrase: "evidence summary"
      use: "증거 요약, 또는 스키마를 뜻할 때는 `EvidenceSummary`"
    - phrase: "evidence collection workflow"
      use: "증거 수집 흐름"
    - phrase: "staged handle"
      use: "스테이징된 아티팩트 핸들, 또는 식별자를 뜻할 때는 `StagedArtifactHandle`"
    - phrase: "checksum, size 검증"
      use: "체크섬과 크기 검증"
    - phrase: "ToolEnvelope 봉투"
      use: "`ToolEnvelope` 요청 래퍼"
    - phrase: "lifecycle 의미"
      use: "생명주기 의미, 또는 산문이 더 자연스러울 때는 생명주기의 뜻"
    - phrase: "surface 정보"
      use: "접점 정보, 또는 필드 이름이면 `surface_id`"
    - phrase: "close blocker를 확인한다"
      use: "닫기 차단 사유를 확인한다"
    - phrase: "blocker 처리 경로"
      use: "차단 사유 처리 경로"
    - phrase: "blocker 라우팅"
      use: "차단 사유 처리 경로"
    - phrase: "`complete` 평가 순서"
      use: "전체 평가 순서"
    - phrase: "complete 평가 순서"
      use: "전체 평가 순서"
    - phrase: "`complete` 닫기 준비 상태 순서"
      use: "전체 닫기 준비 상태 평가 순서"
    - phrase: "complete 닫기 준비 상태 순서"
      use: "전체 닫기 준비 상태 평가 순서"
    - phrase: "스코프"
      use: "범위"
    - phrase: "migration = 이전 선택"
      use: "기술 마이그레이션 문맥에서는 마이그레이션"
terms:
  harness:
    category: "product_concept"
    en: "Harness"
    ko_reference: "하네스"
    ko_user: "하네스"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/runtime-boundaries.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/runtime-boundaries.md"
  product_repository:
    category: "product_label"
    en: "Product Repository"
    ko_reference: "Product Repository"
    ko_user: "제품 저장소"
    preserve_as_label:
      - "Product Repository"
    owner_documents:
      en:
        - "docs/en/reference/runtime-boundaries.md"
      ko:
        - "docs/ko/reference/runtime-boundaries.md"
  harness_runtime_home:
    category: "product_label"
    en: "Harness Runtime Home"
    ko_reference: "Harness Runtime Home"
    ko_user: "런타임 홈"
    preserve_as_label:
      - "Harness Runtime Home"
    owner_documents:
      en:
        - "docs/en/reference/runtime-boundaries.md"
      ko:
        - "docs/ko/reference/runtime-boundaries.md"
  documentation:
    category: "general_prose"
    en: "documentation"
    ko_reference: "문서"
    ko_user: "문서"
    owner_documents:
      en:
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/runtime-boundaries.md"
        - "docs/en/build/implementation-guide.md"
      ko:
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/runtime-boundaries.md"
        - "docs/ko/build/implementation-guide.md"
    notes:
      - "Documentation work does not implement runtime behavior or create generated runtime records."
  baseline_scope:
    category: "product_concept"
    en: "baseline scope"
    ko_reference: "기준 범위"
    ko_user: "기준 범위"
    aliases_en:
      - "baseline"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "Do not describe out-of-scope capabilities as baseline requirements."
      - "Baseline scope is the stable scope contract, not the currently applied `Task` or Change Unit scope."
  supported_scope:
    category: "product_concept"
    en: "supported scope"
    ko_reference: "지원 범위"
    ko_user: "지원되는 범위"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
      ko:
        - "docs/ko/reference/scope.md"
    notes:
      - "Use for behavior or capability documented as supported."
      - "Do not use supported scope for the currently applied scope inside a `Task` or Change Unit."
      - "Korean may use 지원 범위 as a noun phrase or 지원되는 범위 when grammar needs a modifier."
  supported_behavior:
    category: "product_concept"
    en: "supported behavior"
    ko_reference: "지원 동작"
    ko_user: "지원 동작"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "Use for behavior documented as supported by Scope and the affected semantic owner."
      - "Do not infer supported behavior from value-set presence, examples, route summaries, or owner-routing terminology."
      - "Do not use supported behavior for runtime-active or currently applied session state."
  supported_api_method:
    category: "api_concept"
    en: "supported API method"
    ko_reference: "지원되는 API 메서드"
    ko_user: "지원되는 API 메서드"
    owner_documents:
      en:
        - "docs/en/reference/api/methods.md"
      ko:
        - "docs/ko/reference/api/methods.md"
    notes:
      - "Use only for a public API method documented as supported."
      - "Preserve exact method identifiers when naming a method."
  supported_api_value:
    category: "api_concept"
    en: "supported API value"
    ko_reference: "지원되는 API 값"
    ko_user: "지원되는 API 값"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "Use only for a value documented as supported."
      - "Presence in a value set does not by itself make an API value supported."
      - "Route value-name questions to API Value Sets and behavior/support questions to the semantic owner."
  out_of_scope_capability:
    category: "product_concept"
    en: "out-of-scope capability"
    ko_reference: "지원 범위 밖 기능"
    ko_user: "지원 범위 밖 기능"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
      ko:
        - "docs/ko/reference/scope.md"
    notes:
      - "An out-of-scope capability is deferred material until an owner promotes it."
  evidence_collection_workflow:
    category: "out_of_scope_capability_term"
    en: "evidence collection workflow"
    ko_reference: "증거 수집 흐름"
    ko_user: "증거 수집 흐름"
    avoid_ko:
      - "evidence collection workflow"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/glossary.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/glossary.md"
    notes:
      - "Use this wording for evidence collection workflows only as terminology or out-of-scope capability wording unless Scope and the affected owners define support."
      - "Do not use collection-output or index wording as a named artifact unless it is an exact supported identifier."
      - "Baseline evidence is recorded evidence and evidence summaries, not a collection workflow feature by name alone."
  expanded_evidence_collection_workflows:
    category: "out_of_scope_capability"
    en: "expanded or additional evidence collection workflows"
    aliases_en:
      - "expanded evidence collection workflows"
      - "additional evidence collection workflows"
    ko_reference: "확장 또는 추가 증거 수집 흐름"
    ko_user: "확장 또는 추가 증거 수집 흐름"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/glossary.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/glossary.md"
    notes:
      - "This is an excluded capability family until Scope and the affected existing owner documents define a supported contract."
      - "Do not define workflow outputs, storage records, or close-readiness behavior from this phrase."
  reserved_value:
    category: "value_status"
    en: "reserved value"
    ko_reference: "예약된 값"
    ko_user: "예약된 값"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "A reserved value may be listed as vocabulary or reserved surface area without being supported behavior."
      - "Presence in a value set does not make behavior supported."
      - "Mark reserved values at the point of use; do not imply default, required, supported, enforced, accepted, verified, or close-ready behavior unless the semantic owner defines that supported behavior."
  profile_gated_value:
    category: "value_status"
    en: "profile-gated value"
    ko_reference: "프로필 조건부 값"
    ko_user: "프로필 조건부 값"
    owner_documents:
      en:
        - "docs/en/reference/scope.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/scope.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "A profile-gated value is available only when the documented profile or gate and owner behavior define it as supported."
      - "Do not treat a profile-gated value as baseline behavior merely because it appears in a value set."
      - "Presence in a value set does not make behavior supported."
  owner_document:
    category: "documentation_concept"
    en: "owner document"
    ko_reference: "담당 문서"
    ko_user: "담당 문서"
    owner_documents:
      en:
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/README.md"
      ko:
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/README.md"
    notes:
      - "Use for the canonical documentation owner of a contract or term."
      - "Product behavior may refer to the owner document that defines a behavior, but file paths are documentation routes, not product actors."
  owner_contract:
    category: "documentation_concept"
    en: "owner contract"
    ko_reference: "담당 계약"
    ko_user: "담당 계약"
    owner_documents:
      en:
        - "docs/en/reference/glossary.md"
        - "docs/en/maintain/authoring-guide.md"
      ko:
        - "docs/ko/reference/glossary.md"
        - "docs/ko/maintain/authoring-guide.md"
    notes:
      - "Use when a product behavior or close effect depends on the contract defined by the relevant owner document."
      - "Korean may use 담당 문서가 정의한 계약 when that is clearer than 담당 계약."
      - "Do not make an owner route or documentation route the actor for product behavior."
  applicable_owner_path:
    category: "documentation_concept"
    en: "applicable owner path"
    ko_reference: "적용되는 담당 경로"
    ko_user: "적용되는 담당 경로"
    owner_documents:
      en:
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/README.md"
        - "docs/doc-index.yaml"
      ko:
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/README.md"
        - "docs/doc-index.yaml"
    notes:
      - "Use for the owner route that applies to a topic."
      - "Use only for documentation routing, not as a product support contract."
      - "Product behavior should name the owner document, owner contract, applicable reference, or concrete owner instead."
      - "Do not use owner-routing terminology as a product behavior, storage persistence condition, or runtime state."
      - "Do not use active or support-contract wording as a broad substitute for applicable owner routing."
  applicable_reference:
    category: "documentation_concept"
    en: "applicable reference"
    ko_reference: "적용되는 참조 문서"
    ko_user: "적용되는 참조 문서"
    owner_documents:
      en:
        - "docs/en/reference/glossary.md"
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/README.md"
      ko:
        - "docs/ko/reference/glossary.md"
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/README.md"
    notes:
      - "Use when prose needs to point product behavior to the reference document that defines the relevant contract."
      - "This is documentation routing shorthand; it is not a runtime record, state value, or storage condition."
  existing_owner:
    category: "documentation_concept"
    en: "existing owner"
    ko_reference: "기존 담당 문서"
    ko_user: "기존 담당 문서"
    aliases_en:
      - "existing canonical owner"
      - "existing owner document"
    owner_documents:
      en:
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/README.md"
      ko:
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/README.md"
    notes:
      - "Use only when the canonical owner already exists and can be linked as the source of normative meaning."
      - "Do not use for an owner placeholder or an owner type that must be created or designated at promotion time."
  promotion_time_owner_update:
    category: "documentation_concept"
    en: "promotion-time owner update"
    ko_reference: "승격 시점의 담당 문서 갱신"
    ko_user: "승격 시점의 담당 문서 갱신"
    owner_documents:
      en:
        - "docs/en/reference/glossary.md"
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/scope.md"
      ko:
        - "docs/ko/reference/glossary.md"
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/scope.md"
    notes:
      - "This means the owner does not exist as a baseline contract owner before promotion."
      - "Do not name a missing owner as if it is an existing canonical owner."
      - "Scope applies the baseline boundary; the glossary gives the term-level definition."
  owner_placeholder:
    category: "documentation_concept"
    en: "owner placeholder"
    ko_reference: "담당 문서 자리표시자"
    ko_user: "담당 문서 자리표시자"
    owner_documents:
      en:
        - "docs/en/maintain/authoring-guide.md"
        - "docs/en/reference/scope.md"
      ko:
        - "docs/ko/maintain/authoring-guide.md"
        - "docs/ko/reference/scope.md"
    notes:
      - "Use only to signal that an out-of-scope capability needs an owner created or designated before baseline support."
      - "An owner placeholder is not an existing owner document."
      - "Do not route readers to an owner placeholder as if it is an existing owner document."
  task:
    category: "product_concept"
    en: "Task"
    ko_reference: "`Task`"
    ko_user: "작업"
    preserve_as_identifier:
      - "Task"
      - "task_id"
      - "active_task_id"
    owner_documents:
      en:
        - "docs/en/reference/core-model.md"
        - "docs/en/reference/api/schema-state.md"
        - "docs/en/reference/api/schema-value-sets.md"
      ko:
        - "docs/ko/reference/core-model.md"
        - "docs/ko/reference/api/schema-state.md"
        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "Preserve `Task` when naming the Harness entity."
      - "Use 작업 only when exact entity identity is not needed."
  scope:
    category: "product_concept"
    en: "scope"
    ko_reference: "범위"
    ko_user: "범위"
    preserve_as_identifier:
      - "scope"
      - "scope_decision"
      - "AuthorizedAttemptScope"
      - "SensitiveActionScope"
    avoid_ko:
      - "스코프"
    owner_documents:
      en:
        - "docs/en/reference/core-model.md"
        - "docs/en/reference/api/methods.md"
        - "docs/en/reference/api/schema-judgment.md"
      ko:
        - "docs/ko/reference/core-model.md"
        - "docs/ko/reference/api/methods.md"
        - "docs/ko/reference/api/schema-judgment.md"
  active_scope:
    category: "runtime_context"
    en: "active scope"
    ko_reference: "현재 적용 범위"
    ko_user: "현재 적용 범위"
    aliases_en:
      - "currently applied scope"
    owner_documents:
      en:
        - "docs/en/reference/core-model.md"
        - "docs/en/reference/api/method-update-scope.md"
      ko:
        - "docs/ko/reference/core-model.md"
        - "docs/ko/reference/api/method-update-scope.md"
    notes:
      - "Use for the scope currently applied inside a `Task` or Change Unit context."
      - "Active is reserved for runtime or session state and exact identifiers, not supported documentation contracts."
      - "Do not use active scope to mean baseline scope, supported scope, or a documentation contract."
      - "In Korean, prefer 현재 적용 범위 when clarity matters; do not automatically translate active as 활성."
  active_change_unit:
    category: "runtime_context"
    en: "active Change Unit"
    ko_reference: "현재 적용 Change Unit"
    ko_user: "현재 적용 Change Unit"
    preserve_as_identifier:
      - "Change Unit"
      - "change_unit_id"
    owner_documents:
      en:
        - "docs/en/reference/core-model.md"
        - "docs/en/reference/api/method-update-scope.md"
      ko:
        - "docs/ko/reference/core-model.md"
        - "docs/ko/reference/api/method-update-scope.md"
    notes:
      - "Use for the currently applied Change Unit in the authority model."
      - "Do not use active Change Unit for a project phase or documentation work phase."
      - "Do not use active Change Unit for a supported documentation contract."
      - "In Korean, prefer 현재 적용 Change Unit when clarity matters; preserve Change Unit as the product term."
  user_owned_judgment:
    category: "product_concept"
    en: "user-owned judgment"
    ko_reference: "사용자 소유 판단"
    ko_user: "사용자 판단"
    preserve_as_identifier:
      - "user_judgment"
      - "UserJudgment"
      - "judgment_kind"
    owner_documents:
      en:
        - "docs/en/reference/core-model.md"
        - "docs/en/reference/api/schema-judgment.md"
      ko:
        - "docs/ko/reference/core-model.md"
        - "docs/ko/reference/api/schema-judgment.md"
    notes:
      - "Keep distinct from final acceptance, residual-risk acceptance, sensitive-action approval, scope changes, and `Write Authorization`."
  close_readiness:
    category: "product_concept"
    en: "close readiness"
    ko_reference: "닫기 준비 상태"
    ko_user: "닫기 가능 여부"
    preserve_as_identifier:
      - "CloseReadinessBlocker"
    avoid_ko:
      - "close 가능성 평가"
      - "닫기 가능성 평가"
    owner_documents:
      en:
        - "docs/en/reference/core-model.md"
      ko:
        - "docs/ko/reference/core-model.md"
