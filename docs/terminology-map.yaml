        - "docs/ko/reference/api/schema-value-sets.md"
    notes:
      - "A profile-gated value is available only when the documented profile or gate and owner behavior are active."
      - "Do not treat a profile-gated value as active MVP behavior merely because it appears in a value set."
  owner_document:
    category: "product_concept"
    en: "owner document"
    ko_reference: "담당 문서"
    ko_user: "담당 문서"
