avoid:
  en:
    - phrase: "Volicord is a local authority record"
      use: "Volicord is the local work-authority product/system for AI-assisted product work; Core is the local authority record for Volicord state."
    - phrase: "local work-authority server"
      use: "local work-authority product/system for Volicord; for implementation context use Volicord implementation, Volicord source repository, Volicord Rust workspace, Volicord installation, `volicord`, or `volicord mcp --stdio` as applicable."
    - phrase: "coding-agent integration"
      use: "agent-host integration, Agent Connection, managed host configuration state, or agent connection according to context."
    - phrase: "Volicord-as-server product label"
      use: "Volicord, Volicord implementation, Volicord source repository, Volicord Rust workspace, Volicord installation, `volicord`, or `volicord mcp --stdio` according to context."
    - phrase: "server implementation set"
      use: "implementation set maintained by this repository."
    - phrase: "server files"
      use: "implementation files, source-repository files, installation files, or installation location according to context."
    - phrase: "server installation storage"
      use: "Volicord installation location or executable installation according to context; do not use for `Volicord Runtime Home` by default."
    - phrase: "active scope"
      use: "current scope or currently applied scope, except when preserving an exact identifier or status value."
    - phrase: "active Change Unit"
      use: "current Change Unit or currently applied Change Unit, except when preserving an exact identifier such as `active_change_unit_ref`."
    - phrase: "active connection context"
      use: "current connection context or currently applied connection context."
    - phrase: "verification expectations"
      use: "verification criteria when the meaning is user-visible criteria for checking work."
    - phrase: "inspection expectations"
      use: "verification criteria when the meaning is user-visible criteria for checking work."
  ko:
    - phrase: "활성 범위"
      use: "현재 적용 범위"
    - phrase: "활성 Change Unit"
      use: "현재 적용 Change Unit"
    - phrase: "확인 기대"
      use: "검증 기준"
    - phrase: "검증 기대치"
      use: "검증 기준"
    - phrase: "close 가능성 평가"
      use: "닫기 준비 상태 평가"
    - phrase: "닫기 가능성 평가"
      use: "닫기 준비 상태 평가"
    - phrase: "artifact 저장"
