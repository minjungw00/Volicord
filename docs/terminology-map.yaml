terms:
  volicord:
    category: "product_concept"
    en: "Volicord"
    en_preferred_prose: "local work-authority control plane"
    ko_reference: "Volicord"
    ko_user: "Volicord"
    ko_reference_first_reference: "Volicord(볼리코드)"
    preserve_as_label:
      - "Volicord"
    primary_owner:
      en: "docs/en/getting-started/overview.md"
      ko: "docs/ko/getting-started/overview.md"
    related_references:
      - en: "docs/en/reference/scope.md"
        ko: "docs/ko/reference/scope.md"
      - en: "docs/en/reference/core-model.md"
        ko: "docs/ko/reference/core-model.md"
      - en: "docs/en/reference/runtime-boundaries.md"
        ko: "docs/ko/reference/runtime-boundaries.md"
    notes:
      - "Volicord is the local work-authority product/system for AI-assisted product work, presented publicly as a local authority control plane."
      - "Do not describe Volicord itself as the authority record; Core is the local authority record for Volicord state."
      - "Do not describe Volicord as the coding agent, workflow engine, test runner, technical-debt analyzer, security sandbox, or full agent harness."
      - "Do not create or use a product label that combines `Volicord` with `Server`; use Volicord implementation, Volicord source repository, Volicord Rust workspace, Volicord installation, `volicord`, or `volicord mcp --stdio` according to context."
  test_harness:
    category: "technical_concept"
    en: "test harness"
    ko_reference: "테스트 하네스"
    ko_user: "테스트 하네스"
    primary_owner:
      en: "docs/en/maintain/brand-guidelines.md"
      ko: "docs/ko/maintain/brand-guidelines.md"
    related_references: []
    notes:
      - "`test harness` is an ordinary technical term for a testing fixture, runner, or execution apparatus."
      - "`test harness` and `테스트 하네스` are not product names, product aliases, or translations of Volicord."
  core:
    category: "product_concept"
    en: "Core"
    ko_reference: "Core"
    ko_user: "Core"
    preserve_as_identifier:
      - "Core"
    primary_owner:
      en: "docs/en/reference/core-model.md"
      ko: "docs/ko/reference/core-model.md"
    related_references:
      - en: "docs/en/reference/storage-records.md"
        ko: "docs/ko/reference/storage-records.md"
      - en: "docs/en/reference/storage-effects.md"
        ko: "docs/ko/reference/storage-effects.md"
    notes:
      - "Core is the local authority record for Volicord state."
      - "Core authority applies to Volicord records and Volicord state transitions, not to OS-level security control by itself."
      - "Use Core when discussing the authority record; use Volicord for the broader product/system."
  local_authority_record:
    category: "product_concept"
    en: "local authority record"
    ko_reference: "로컬 기준 기록"
    ko_user: "로컬 기준 기록"
    primary_owner:
      en: "docs/en/reference/core-model.md"
      ko: "docs/ko/reference/core-model.md"
    related_references:
      - en: "docs/en/reference/runtime-boundaries.md"
        ko: "docs/ko/reference/runtime-boundaries.md"
    notes:
      - "Use this concept for Core, not Volicord as a whole."
      - "A location, rendered view, chat answer, documentation route, or product repository file is not the local authority record."
  product_repository:
    category: "product_label"
    en: "Product Repository"
    ko_reference: "Product Repository"
    ko_user: "제품 저장소"
    ko_reference_first_reference: "`Product Repository`(제품 저장소)"
    preserve_as_label:
      - "Product Repository"
    primary_owner:
      en: "docs/en/reference/runtime-boundaries.md"
      ko: "docs/ko/reference/runtime-boundaries.md"
    related_references: []
    notes:
      - "`Product Repository` is the product files/repository boundary."
      - "Do not treat `Product Repository` content as Volicord runtime state, `Volicord Runtime Home`, or proof of Volicord authority."
  volicord_runtime_home:
    category: "product_label"
    roles:
      - "public_user_term"
    en: "Volicord Runtime Home"
    aliases_en:
      - "Runtime Home"
    ko_reference: "Volicord Runtime Home"
    ko_user: "런타임 홈"
    ko_reference_first_reference: "`Volicord Runtime Home`(런타임 홈)"
    preserve_as_label:
      - "Volicord Runtime Home"
    primary_owner:
      en: "docs/en/reference/runtime-boundaries.md"
      ko: "docs/ko/reference/runtime-boundaries.md"
    related_references: []
    notes:
      - "`Volicord Runtime Home` is the local runtime storage location for Volicord operational data as storage/runtime owners define it."
      - "Do not treat `Volicord Runtime Home` as `Product Repository`, a Volicord installation location by default, a security boundary, or isolation by default."
  volicord_implementation:
    category: "product_concept"
    en: "Volicord implementation"
    en_preferred_prose: "Volicord implementation"
    ko_reference: "Volicord 구현"
    ko_user: "Volicord 구현"
    primary_owner:
      en: "docs/en/reference/runtime-boundaries.md"
      ko: "docs/ko/reference/runtime-boundaries.md"
    related_references:
      - en: "docs/en/development/architecture.md"
        ko: "docs/ko/development/architecture.md"
      - en: "docs/en/reference/admin-cli.md"
        ko: "docs/ko/reference/admin-cli.md"
      - en: "docs/en/reference/mcp-transport.md"
        ko: "docs/ko/reference/mcp-transport.md"
      - en: "docs/en/reference/security.md"
        ko: "docs/ko/reference/security.md"
    notes:
      - "Use Volicord implementation for the implementation set maintained by this repository."
      - "The Volicord implementation includes implementation crates, the `volicord` administrative CLI and MCP subcommand, the `volicord-mcp` crate, tests, documentation, validation tooling, and repository configuration at source level."
      - "A Volicord installation is the deployed subset of executables and required runtime resources; do not imply that every source-repository file is installed."
      - "`volicord` is the installed executable; generated host configuration starts MCP through `volicord mcp --stdio`. Name the command mode when describing behavior performed by the MCP process."
      - "Do not use Volicord implementation to mean Volicord as a whole, Core, `Volicord Runtime Home`, the `Product Repository`, a single daemon, or a network listener."
      - "Do not create a product label that combines `Volicord` with `Server`."
  volicord_source_repository:
    category: "product_concept"
