version: 1
title: "Terminology Map"
role: "Machine-readable terminology metadata and bilingual wording controls."
documentation_metadata_only: true
runtime_config: false
canonical_for:
  - "Complete structured term inventory under `terms` for Volicord documentation; glossary pages are curated reader-facing subsets and do not need rows for every structured term."
  - "Korean term forms through `ko_reference`, `ko_user`, `ko_contextual`, `ko_explanation`, and first-reference wording fields."
  - "Term type through each entry's `category` value."
  - "Role metadata through each entry's `roles` values for identity-sensitive public, storage, MCP, and diagnostic terminology."
  - "Identifier preservation rules for bilingual documentation."
  - "Primary owner and related-reference routing for each structured term."
  - "Preferred expressions and avoid expressions for documentation maintenance and automated checks."
  - "Term notes needed for owner routing, identifier preservation, Korean prose, and check behavior."
  - "Mixed-language Korean expressions to avoid during human or LLM editing."
  - "Korean close-readiness terminology routing for `닫기 준비 상태` and `닫기 가능 여부`."
  - "Search-friendly routing for promotion-time owner update terminology."
  - "Terminology distinction between `complete` as an enum/identifier and ordinary prose meaning full or entire."
  - "Terminology boundaries for reserved/profile-gated value presence versus supported behavior."
  - "Terminology boundaries between stable supported documentation contracts and runtime-active or currently applied context."
  - "Terminology boundaries between documentation owner routing and product behavior or storage persistence conditions."
  - "Terminology distinction that Volicord is the local work-authority product/system for AI-assisted product work, while Core is the local authority record for Volicord state."
  - "Terminology routing that Volicord product identity belongs in Getting Started Overview while supported and unsupported scope belongs in Scope."
  - "Terminology boundaries among Volicord, Core, Volicord implementation, Volicord source repository, Volicord installation, `volicord`, `volicord mcp --stdio`, `Volicord Runtime Home`, `test harness`, and `Product Repository`."
  - "Preferred current-runtime-context wording for current scope, currently applied scope, current Change Unit, and current connection context."
  - "Terminology boundaries among Write Check, write approval, sensitive-action approval, final acceptance, residual-risk acceptance, and user-owned judgment."
  - "Terminology boundaries among Agent Connection, Connection Projects, User Channel, `actor_source`, `operation_category`, and Write Check."
  - "Preferred verification criteria wording for user-visible criteria used to check work."
  - "Terminology routing for API error-code meanings, error precedence, API response branch routing, blocker routing, dry-run preview routing, public error as blocker wording, `ToolError.details`, and error detail helper values."
  - "Artifact and evidence terminology conventions for bilingual documentation."
  - "Terminology routing for evidence collection workflow wording, close-task behavior, and design-quality owner boundaries."
does_not_own:
  - "Reader-facing glossary definitions, curated glossary subset selection, or full reference owner indexes."
  - "Product, API, storage, security, projection, or runtime contracts."
  - "Rendered UI copy when an exact template body owner defines the wording."
  - "Runtime localization configuration."
related_documents:
  reference_index:
    en: "docs/en/reference/README.md"
    ko: "docs/ko/reference/README.md"
  glossary:
    en: "docs/en/reference/glossary.md"
    ko: "docs/ko/reference/glossary.md"
  translation_policy:
    en: "docs/en/maintain/translation-policy.md"
    ko: "docs/ko/maintain/translation-policy.md"
related_metadata:
  doc_index: "docs/doc-index.yaml"
term_entry_schema:
  term_identifier:
    source: "mapping key under `terms`"
    rule: "Use stable snake_case keys for machine-readable term records."
  entry_shape:
    rule: "Each `terms` entry uses the required fields below plus only the listed optional fields."
    primary_owner_rule: "`primary_owner` is the single focused owner for the term; adjacent routes stay in `related_references`."
    related_reference_rule: "`related_references` is always a list and may be empty."
  language_path_pair:
    rule: "Use `{en: path, ko: path}` for paired documentation. Use the same path in both keys for shared metadata documents."
  required_fields:
    - "category"
    - "en"
    - "ko_reference"
    - "ko_user"
    - "primary_owner"
    - "related_references"
  optional_fields:
    - "roles"
    - "aliases_en"
    - "en_label"
    - "en_preferred_prose"
    - "ko_contextual"
    - "ko_explanation"
    - "ko_reference_first_reference"
    - "preserve_identifier"
    - "preserve_as_identifier"
    - "preserve_as_label"
    - "avoid_en"
    - "avoid_ko"
    - "notes"
  preferred_expression_fields:
    - "en"
    - "en_label"
    - "en_preferred_prose"
    - "ko_reference"
    - "ko_user"
    - "ko_contextual"
    - "ko_explanation"
    - "ko_reference_first_reference"
  identifier_preservation_fields:
    - "preserve_identifier"
    - "preserve_as_identifier"
    - "preserve_as_label"
  avoid_expression_fields:
    - "avoid.en"
    - "avoid.ko"
    - "avoid_en"
    - "avoid_ko"
  avoid_expression_rule: "Use top-level `avoid.en` and `avoid.ko` for shared searchable avoid expressions; use term-level `avoid_en` or `avoid_ko` only for term-local expressions not already represented there."
  field_types:
    category: "string term type"
    roles: "list of role strings for identity-sensitive terminology"
    en: "string preferred English term"
    aliases_en: "list of strings"
    en_label: "string exact English product label"
    en_preferred_prose: "string preferred English prose expression"
    ko_reference: "string reference-facing Korean term form"
    ko_user: "string user-facing Korean term form"
    ko_contextual: "mapping of context key to Korean term form"
    ko_explanation: "string Korean explanation for an exact identifier or label"
    ko_reference_first_reference: "string Korean first-reference form"
    preserve_identifier: "boolean"
    preserve_as_identifier: "list of exact identifier strings"
    preserve_as_label: "list of exact product-label strings"
    primary_owner: "language path pair for one focused owner document"
    related_references: "list of language path pairs for adjacent documents"
    avoid_en: "term-local list of searchable English expressions to avoid; use only when the expression is not already represented in top-level `avoid.en`"
    avoid_ko: "term-local list of searchable Korean expressions to avoid; use only when the expression is not already represented in top-level `avoid.ko`"
    notes: "list of strings for terminology checks and maintenance routing"
  field_semantics:
    category: "Term type used by terminology and maintenance checks."
    roles: "Small controlled role set used to distinguish public user terminology, storage internals, MCP process binding, diagnostics, public MCP selectors, and storage records without making a document-wide forbidden-word list."
    primary_owner: "Focused owner document for the term's definition, contract, or terminology rule."
    related_references: "Adjacent documents that help interpret the term; these paths are not alternate primary owners."
    notes: "Check-oriented guidance for terminology, owner routing, identifier preservation, and Korean prose."
  role_values:
    public_user_term: "Reader-facing product terminology that ordinary users may see or use."
    storage_internal_identifier: "Internal storage identifier or key terminology, not an ordinary public selector."
    storage_record: "Named storage record or table terminology."
    mcp_process_binding: "MCP adapter process-binding terminology used to start or bind a local process."
    diagnostic_field: "Diagnostic or implementation-owned output field terminology."
    mcp_public_selector: "Public MCP selector terminology exposed for caller-owned selection."
  owner_path_rule: "Every `primary_owner` and `related_references` path must exist and be represented in `docs/doc-index.yaml`."
  index_owner_rule: "Use an index as `primary_owner` only for index-owned navigation terms."
identifier_preservation:
  rule: "Preserve exact identifiers unchanged in English and Korean. Use backticks in prose when the value is code-like, schema-like, or a product label that must be searched exactly."
  exact_identifier_classes:
    - "file paths and anchors"
    - "`doc_id` values"
    - "API methods, tool names, resource names, and MCP method names"
    - "schema names, schema fields, and object names"
    - "enum values, status values, error codes, validator IDs, and table names"
    - "DDL, column names, storage identifiers, template names, and code literals"
    - "intentional Volicord product labels"
  backtick_contexts:
    - "prose mentions of code-like, schema-like, route-like, or search-critical values"
    - "exact product labels when the label itself is being named"
    - "file paths, anchors, and machine-readable keys when prose clarity requires exact search"
  literal_translation_exclusions:
    - "code blocks"
    - "schema examples"
    - "API examples"
    - "file paths"
    - "field lists"
    - "literal-value tables"
    - "machine-readable metadata"
  identifiers:
    - "Task"
    - "task_id"
    - "active_task_id"
    - "scope"
    - "scope_decision"
    - "UserJudgment"
    - "user_judgment"
