name: Release Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "scripts/install.sh"
      - "scripts/smoke-test-binary.sh"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "crates/**"

permissions:
  contents: read

env:
  RUST_VERSION: "1.85.0"

jobs:
  binary:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustup target add "${{ matrix.target }}"

      - name: Build volicord
        run: cargo build --locked --release -p volicord-cli --bin volicord --target "${{ matrix.target }}"

      - name: Smoke test binary
        run: scripts/smoke-test-binary.sh "target/${{ matrix.target }}/release/volicord"

      - name: Package artifact
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -eu
          binary="target/$TARGET/release/volicord"
          package="volicord-$TARGET"
          dist="dist"
          staging="$dist/$package"
          mkdir -p "$staging"
          cp "$binary" "$staging/volicord"
          chmod 0755 "$staging/volicord"
          tar -C "$staging" -czf "$dist/$package.tar.gz" volicord
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$dist/$package.tar.gz" > "$dist/$package.tar.gz.sha256"
          else
            shasum -a 256 "$dist/$package.tar.gz" > "$dist/$package.tar.gz.sha256"
          fi
          rm -rf "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: volicord-${{ matrix.target }}
          path: |
            dist/volicord-${{ matrix.target }}.tar.gz
            dist/volicord-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  docker-image:
    name: Docker image
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t volicord:${{ github.sha }} .

      - name: Smoke test image
        run: docker run --rm volicord:${{ github.sha }} --help

  publish-release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - binary
      - docker-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: volicord-*
          path: dist
          merge-multiple: true

      - name: Add install script and aggregate checksums
        run: |
          set -eu
          cp scripts/install.sh dist/install.sh
          chmod 0644 dist/install.sh
          (cd dist && cat *.sha256 > volicord-checksums.txt)

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="$GITHUB_REF_NAME"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Volicord $tag"
          fi
          gh release upload "$tag" dist/* --clobber
